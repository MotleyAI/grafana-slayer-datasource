# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.0.0.
  # Manual dry-run knob: lets you exercise the build path without tagging.
  # When triggered this way the sign step is skipped (no policy_token below),
  # so no remote state in Grafana's signing registry is mutated and you don't
  # burn a version number on a failing build.
  workflow_dispatch:

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # build-plugin@v1.0.2 defaults go-version to "1.21" and sets
      # GOTOOLCHAIN=local before invoking mage, so we MUST override here —
      # go.mod requires 1.25.7 (Grafana plugin SDK also pins to 1.25).
      # Pinning to the exact patch avoids any setup-go resolution ambiguity.
      # node-version: '22' silences the engine warning and matches ci.yml.
      #
      # On manual workflow_dispatch runs we omit policy_token, so the action's
      # internal sign step is skipped — useful for build smoke-tests without
      # registering a version in Grafana's signing registry.
      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.0.2
        with:
          policy_token: ${{ github.event_name == 'push' && secrets.GRAFANA_ACCESS_POLICY_TOKEN || '' }}
          go-version: '1.25.7'
          node-version: '22'
