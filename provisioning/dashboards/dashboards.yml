apiVersion: 1

providers:
  - name: 'SLayer demos'
    type: file
    folder: 'SLayer'
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      # Path inside the container — provisioning/ is mounted to /etc/grafana/provisioning.
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
