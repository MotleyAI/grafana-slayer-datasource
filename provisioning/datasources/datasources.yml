apiVersion: 1

datasources:
  - name: 'slayer'
    type: 'motley-slayer-datasource'
    access: proxy
    isDefault: true
    orgId: 1
    version: 1
    editable: true
    jsonData:
      # SLayer REST API base URL. The `slayer` service in docker-compose listens
      # on this hostname inside the compose network.
      url: 'http://slayer:5143'
    # secureJsonData (apiKey, etc.) intentionally omitted — SLayer ≤0.6.x has
    # no auth. The plugin sends an Authorization header only when a key is set.
